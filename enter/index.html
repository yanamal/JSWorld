<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Enter</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.4.12/ace.js"></script>
    <!-- Loade js-interpreter FIRST, then override its acorn version with the modern acorn version that has a CDN and can be used with the modern acorn-loose.
         We then use the modern acorn but specify that we are parsing ecma version 5, which is what JS-interpreter expects.
         This should be fine, nothing can go wrong.-->
    <script src="https://cdn.jsdelivr.net/npm/js-interpreter/lib/js-interpreter.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/acorn@8.14.0/dist/acorn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/acorn-loose@8.4.0/dist/acorn-loose.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/yanamal/VisualInterpreterJS/visualize.js"></script>
    <script src="./enter.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/yanamal/VisualInterpreterJS/visualize.css">
    <link rel="stylesheet" href="enter.css">
</head>
<body>

    <div id="scene">
        <div id="door_wrapper">
            <div id="door" role="button" tabindex="0" aria-label="Open magical door">
                <div id="door_handle" aria-hidden="true"></div>
            </div>
            <div id="scroll" role="button" tabindex="0" aria-label="Enter the magical world of programming">
                <h1>It's a PROTOTYPE!!</h1>
                <div id="scroll-text">

                </div>
            </div>
        </div>
    </div>

    <div id="test_buttons" hidden>
        <button onclick="start_popups()">Start popups</button>
        <button onclick="runRemovePopups()">Start removal</button>
    </div>

    <pre id="code_viz" hidden></pre>

    <div id="wizard" aria-hidden="true">
        <img class="wizard_body" src="../img/wizard1.png" alt="a wizard">
        <img id="wand" src="../img/wand1.png" alt="a hand with a wand">
    </div>

    <div id="wizard_speech" role="status" aria-live="polite" hidden></div>

    <div id="popups"></div>

    <script>
        document.getElementById('scroll-text').innerHTML = marked.parse(`
- It might break. (quota, bugs)
- Yes, I'm sure it's too slow, too fast, backwards, not signposted enough, missing "quality-of-life" features.
- Vertical slice - not necessarily the exact teaching sequence (need to test) (No, I don't know that this is the exact...)
- There is no state!

Functionality is the focus: precise visual metaphors; bespoke worlds/situations for concepts; **intelligent**(ly designed) AI assistance.

Click anywhere on the scroll to continue!
        `);
    </script>

</body>
</html>
