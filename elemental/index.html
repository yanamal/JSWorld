<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>It's Elemental!</title>

    <!-- Load js-interpreter first, then acorn/acorn-loose -->
    <script src="https://cdn.jsdelivr.net/npm/js-interpreter/lib/js-interpreter.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/acorn@8.14.0/dist/acorn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/acorn-loose@8.4.0/dist/acorn-loose.min.js"></script>

    <script src="https://cdn.jsdelivr.net/gh/yanamal/VisualInterpreterJS@latest/visualize.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/yanamal/VisualInterpreterJS/visualize.css">

    <script src="https://cdn.jsdelivr.net/npm/ace-builds@1.36.2/src-min-noconflict/ace.js"></script>
    <link rel="stylesheet" href="../common/codescroll.css">
    <script src="../common/codescroll.js"></script>

    <link rel="stylesheet" href="elemental.css">
</head>
<body>
    <div id="playArea">
        <canvas id="waterCanvas"></canvas>
    </div>

    <div id="spells" style="position: absolute; left: 20px; top: 20px;z-index:2;">
        <div id="splash-scroll" style="position: absolute"></div>
        <div id="whoosh-scroll" style="position: absolute; top: 72px;"></div>
        <div id="put-out-fire-scroll" style="position: absolute; top: 144px;"></div>
    </div>

    <div id="wizard" style="position: fixed; scale: 50%; right:500px; bottom: 620px;width: 0;height: 0;">
        <img class="wizard_body" src="../img/wizard1.png" alt="a wizard">
    </div>

    <div id="coordinates">
        <div>Player: <span id="playerPos">(0, 0)</span></div>
        <div>Facing: <span id="playerAngle">0°</span></div>
    </div>
    <div id="targetingCue" role="status" aria-live="polite" hidden></div>

    <script src="magic_system.js"></script>
    <script src="magic_interpreter.js"></script>
    <script src="magic_spells.js"></script>
</body>
</html>
